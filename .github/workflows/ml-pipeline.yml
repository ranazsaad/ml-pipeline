name: ML Model CI

on:
  push:
    branches-ignore:
      - main   
  pull_request:
  workflow_dispatch:   

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Model Dry Test
        run: python -c "import torch; print('Model environment ready!')"

      - name: Upload README
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md
